# Mod → Base Promotion Workflow
#
# Semi-automates moving approved mod changes into the base library.
#
# HOW TO USE
# ----------
# 1. Go to Actions → "Promote Mod Changes to Base" → "Run workflow".
# 2. Choose the version-bump type:
#      patch  → 1.0.0  becomes 1.0.1  (bug fixes / small tweaks)
#      minor  → 1.0.0  becomes 1.1.0  (new backward-compatible features)
#      major  → 1.0.0  becomes 2.0.0  (breaking changes)
# 3. Click "Run workflow".
# 4. The workflow creates a new branch and opens a Pull Request.
# 5. Review the PR, then merge it to complete the promotion.

name: Promote Mod Changes to Base

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: >
          Version bump type — patch (1.0.0→1.0.1), minor (1.0.0→1.1.0),
          or major (1.0.0→2.0.0)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote mod → base
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Read and bump the base version ────────────────────────────────
      - name: Read and bump version
        id: version
        run: |
          CURRENT=$(cat base/VERSION | tr -d '[:space:]')
          echo "Current base version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New base version:     $NEW_VERSION"

          echo "current=$CURRENT"   >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION"   >> "$GITHUB_OUTPUT"

      # ── 3. Create a promotion branch ─────────────────────────────────────
      - name: Create promotion branch
        id: branch
        run: |
          BRANCH="promote/mod-to-base-v${{ steps.version.outputs.new }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 4. Copy mod files into base ───────────────────────────────────────
      - name: Copy mod files into base
        run: |
          # Copy every file from mod/ into base/, preserving directory structure.
          # README.md is excluded because base/ has its own README.
          find mod/ -type f ! -name 'README.md' | while read -r src; do
            dest="base/${src#mod/}"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
            echo "Copied: $src → $dest"
          done

      # ── 5. Update the version file ────────────────────────────────────────
      - name: Update base/VERSION
        run: |
          echo "${{ steps.version.outputs.new }}" > base/VERSION

      # ── 6. Commit and push ────────────────────────────────────────────────
      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add base/
          if git diff --cached --quiet; then
            echo "::error::No changes detected in mod/ to promote to base/. Add files to mod/ before running this workflow."
            exit 1
          fi

          git commit -m "chore: promote mod → base (v${{ steps.version.outputs.new }})"
          git push origin "${{ steps.branch.outputs.name }}"

      # ── 7. Open a Pull Request for human review ───────────────────────────
      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "chore: promote mod → base (v${{ steps.version.outputs.new }})" \
            --body "## Mod → Base Promotion

          This PR was automatically generated by the **Promote Mod Changes to Base** workflow.

          | Field | Value |
          |-------|-------|
          | Previous base version | \`${{ steps.version.outputs.current }}\` |
          | New base version | \`${{ steps.version.outputs.new }}\` |
          | Version bump type | \`${{ github.event.inputs.version_bump }}\` |
          | Triggered by | @${{ github.actor }} |

          ### What to do next
          1. Review the file changes in the **Files changed** tab.
          2. If everything looks correct, **approve and merge** this PR.
          3. The base library will be updated to version \`${{ steps.version.outputs.new }}\`.

          > ⚠️ Do **not** merge this PR until it has been fully reviewed."
